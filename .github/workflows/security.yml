name: Security

on:
  push:
    branches:
      - Master
  pull_request: {}

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.10'

      - name: Sync dependencies
        run: uv sync --dev

      - name: Bandit
        run: uv run bandit -r src tools/validation_gate.py -s B106,B404,B603

      - name: Dependency audit
        # CVE-2026-4539  (Pygments ReDoS): no patched release available yet; drop when pygments is updated.
        # CVE-2026-3219  (Pip audit vulnerability): no patched release available yet; drop when pip is updated.
        run: >-
          uv run pip-audit
          --ignore-vuln CVE-2026-4539
          --ignore-vuln CVE-2026-3219
          --skip-editable

      - name: Secret scan
        shell: bash
        run: |
          git ls-files -z | xargs -0 uv run detect-secrets-hook \
            --baseline .secrets.baseline \
            --exclude-files '(\.env(\.example)?$|agent_manifest\.json$|test_diagnostics_export\.py$|manifest_keys\.json$)'
