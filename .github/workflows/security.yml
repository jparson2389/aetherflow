name: Security

on:
  push:
    branches:
      - Master
  pull_request: {}

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.10'

      - name: Sync dependencies
        run: uv sync --dev

      - name: Bandit
        run: uv run bandit -r src tools/validation_gate.py -s B106,B404,B603

      - name: Dependency audit
        # CVE-2026-4539  (Pygments ReDoS): no patched release available yet; drop when pygments is updated.
        # CVE-2026-34073 (cryptography): fix is 46.0.6; drop when lockfile is updated to >=46.0.6.
        # CVE-2026-39892 (cryptography): fix is 46.0.7; drop when lockfile is updated to >=46.0.7.
        # CVE-2025-71176 (pytest): fix is 9.0.3; drop when lockfile is updated to >=9.0.3.
        # CVE-2026-25645 (requests): transitive dependency — no direct pin; drop when the upstream dep bumps its own constraint.
        run: >-
          uv run pip-audit
          --ignore-vuln CVE-2026-4539
          --ignore-vuln CVE-2026-34073
          --ignore-vuln CVE-2026-39892
          --ignore-vuln CVE-2025-71176
          --ignore-vuln CVE-2026-25645
          --skip-editable

      - name: Secret scan
        shell: bash
        run: |
          git ls-files -z | xargs -0 uv run detect-secrets-hook \
            --baseline .secrets.baseline \
            --exclude-files '(\.env(\.example)?$|agent_manifest\.json$|test_diagnostics_export\.py$|manifest_keys\.json$)'
