name: Run Claude Code Review

on:
  workflow_dispatch: {}

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: >
            Review this pull request for bugs, regressions, security issues,
            and missing tests. Leave actionable review comments on the PR.
