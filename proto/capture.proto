syntax = "proto3";

package aetherflow.capture.v1;

// Frozen Phase 0 control-plane capture contract.
message CaptureMode {
  // Logical frame geometry and pixel label expected by the shared-memory ring.
  uint32 width = 1;
  uint32 height = 2;
  uint32 target_fps = 3;
  string pixel_format = 4;
  uint32 stride_bytes = 5;
}

// Start capture for a specific plugin/device pairing.
message CaptureStartRequest {
  string capture_plugin_id = 1;
  string device_id = 2;
  CaptureMode mode = 3;
  uint32 timeout_ms = 4;
}

// Stop capture and preserve the caller-supplied stop reason for diagnostics.
message CaptureStopRequest {
  string capture_plugin_id = 1;
  string device_id = 2;
  string reason = 3;
}

// Unary status returned by runtime-control operations.
message OperationStatus {
  bool ok = 1;
  string runtime_state = 2;
  string message = 3;
  uint32 retry_budget_remaining = 4;
}

// Worker liveness report emitted on the heartbeat cadence.
message WorkerHeartbeat {
  string worker_id = 1;
  string health = 2;
  uint32 missed_heartbeats = 3;
  uint64 timestamp_ns = 4;
}

// Worker log line forwarded to the host for UI and diagnostics surfaces.
message WorkerLog {
  string worker_id = 1;
  string level = 2;
  string message = 3;
  uint64 timestamp_ns = 4;
}

// Plugin load result including the resulting runtime state and load failure text.
message PluginLoadResult {
  string plugin_id = 1;
  bool loaded = 2;
  string runtime_state = 3;
  string error_code = 4;
  string error_message = 5;
}

message DiagnosticsExportRequest {
  repeated string include_sections = 1;
  bool include_recent_logs = 2;
}

message DiagnosticsExportResponse {
  string artifact_path = 1;
  string summary = 2;
}

// Capture control-plane RPC surface. Timeout and retry posture is normative in
// docs/proto/capture.md and enforced by contract tests.
service CaptureControl {
  rpc StartCapture(CaptureStartRequest) returns (OperationStatus);
  rpc StopCapture(CaptureStopRequest) returns (OperationStatus);
  rpc ReportHeartbeat(WorkerHeartbeat) returns (OperationStatus);
  rpc ForwardWorkerLog(WorkerLog) returns (OperationStatus);
  rpc ReportPluginLoadResult(PluginLoadResult) returns (OperationStatus);
  rpc ExportDiagnostics(DiagnosticsExportRequest)
      returns (DiagnosticsExportResponse);
}
