syntax = "proto3";

package aetherflow.capture.v1;

message CaptureMode {
  uint32 width = 1;
  uint32 height = 2;
  uint32 target_fps = 3;
  string pixel_format = 4;
  uint32 stride_bytes = 5;
}

message CaptureStartRequest {
  string capture_plugin_id = 1;
  string device_id = 2;
  CaptureMode mode = 3;
  uint32 timeout_ms = 4;
}

message CaptureStopRequest {
  string capture_plugin_id = 1;
  string device_id = 2;
  string reason = 3;
}

message OperationStatus {
  bool ok = 1;
  string runtime_state = 2;
  string message = 3;
  uint32 retry_budget_remaining = 4;
}

message WorkerHeartbeat {
  string worker_id = 1;
  string health = 2;
  uint32 missed_heartbeats = 3;
  uint64 timestamp_ns = 4;
}

message WorkerLog {
  string worker_id = 1;
  string level = 2;
  string message = 3;
  uint64 timestamp_ns = 4;
}

message PluginLoadResult {
  string plugin_id = 1;
  bool loaded = 2;
  string runtime_state = 3;
  string error_code = 4;
  string error_message = 5;
}

message DiagnosticsExportRequest {
  repeated string include_sections = 1;
  bool include_recent_logs = 2;
}

message DiagnosticsExportResponse {
  string artifact_path = 1;
  string summary = 2;
}

service CaptureControl {
  rpc StartCapture(CaptureStartRequest) returns (OperationStatus);
  rpc StopCapture(CaptureStopRequest) returns (OperationStatus);
  rpc ReportHeartbeat(WorkerHeartbeat) returns (OperationStatus);
  rpc ForwardWorkerLog(WorkerLog) returns (OperationStatus);
  rpc ReportPluginLoadResult(PluginLoadResult) returns (OperationStatus);
  rpc ExportDiagnostics(DiagnosticsExportRequest)
      returns (DiagnosticsExportResponse);
}
